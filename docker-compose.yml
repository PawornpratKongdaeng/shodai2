version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shodai-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: my_store
    ports:
     - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: